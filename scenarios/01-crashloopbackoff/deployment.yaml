apiVersion: v1
kind: Namespace
metadata:
  name: ktslab
  labels:
    app.kubernetes.io/part-of: ktslab
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
  namespace: ktslab
  labels:
    app: webapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp
    spec:
      restartPolicy: Always
      containers:
        - name: webapp
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Validating required configuration..."
              if [ -z "$DATABASE_URL" ]; then
                echo "Error: DATABASE_URL environment variable is required."
                echo "Usage: webapp [--config path]"
                exit 1
              fi
              echo "Starting webapp with DATABASE_URL=$DATABASE_URL"
              exec httpd -f -p 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          # The fix: provide DATABASE_URL via a Secret or ConfigMap.
          # Uncomment and create the secret to resolve the CrashLoopBackOff.
          # env:
          #   - name: DATABASE_URL
          #     valueFrom:
          #       secretKeyRef:
          #         name: webapp-db
          #         key: url
          # startupProbe:
          #   httpGet:
          #     path: /
          #     port: 8080
          #   failureThreshold: 30
          #   periodSeconds: 2

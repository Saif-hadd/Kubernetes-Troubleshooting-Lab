apiVersion: v1
kind: Service
metadata:
  name: webapp
  namespace: ktslab
  labels:
    app: webapp
spec:
  type: ClusterIP
  # BUG: selector does not match the Deployment's labels (app: web-frontend).
  # As a result the Service has zero Endpoints and the Ingress returns 503.
  selector:
    app: webapp
  ports:
    - name: http
      port: 8080
      targetPort: 80
      protocol: TCP
# Fix: align the selector with the Pod labels:
#   selector:
#     app: web-frontend

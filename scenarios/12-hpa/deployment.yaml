apiVersion: v1
kind: Namespace
metadata:
  name: ktslab
  labels:
    app.kubernetes.io/part-of: ktslab
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: ktslab
  labels:
    app: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      restartPolicy: Always
      containers:
        - name: api
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args: ["echo 'api ready'; sleep 3600"]
          resources:
            # CPU HPA requires requests.cpu. If this is missing the HPA shows
            # <unknown>. With metrics-server absent it ALSO shows <unknown>.
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              memory: 128Mi

apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: ktslab-validator
  labels:
    app.kubernetes.io/part-of: ktslab
webhooks:
  - name: validator.ktslab.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    # A down webhook with failurePolicy: Fail + a 10s timeout stalls ALL
    # matched creates for 10s then denies them -> the API server looks slow
    # and Pods never start.
    failurePolicy: Fail
    timeoutSeconds: 10
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["pods"]
        scope: Namespaced
    clientConfig:
      service:
        name: validator
        namespace: ktslab
        path: /validate
        port: 443
      # In a real cluster a caBundle is required; omitted here for portability.
# To reproduce the failure, ensure the validator Service has no backing Pods:
#   kubectl get endpoints -n ktslab validator   # <none>
# Then apply this webhook and watch Pod creation stall.
#
# Fix A — set failurePolicy: Ignore and timeoutSeconds: 1 so a down webhook
#         does not block writes.
# Fix B — restore the validator backing Pods so the webhook succeeds.
# Fix C — delete the webhook configuration:
#   kubectl delete validatingwebhookconfiguration ktslab-validator

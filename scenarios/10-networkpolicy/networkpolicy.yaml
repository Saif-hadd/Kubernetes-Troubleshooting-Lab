apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: db-deny-ingress
  namespace: ktslab
  labels:
    app: db
spec:
  # Selects the db Pod -> isolates it for ingress.
  podSelector:
    matchLabels:
      app: db
  # No ingress rules => default-deny all ingress to the db Pod.
  # The api Pod can no longer reach db -> connection timeouts.
  policyTypes:
    - Ingress
# Fix — allow ingress from the api Pod on the DB port:
#   policyTypes:
#     - Ingress
#   ingress:
#     - from:
#         - podSelector:
#             matchLabels:
#               app: api
#       ports:
#         - protocol: TCP
#           port: 5432
#
# NOTE: requires an enforcing CNI (Calico/Cilium). EKS VPC CNI does NOT
# enforce NetworkPolicy by default.

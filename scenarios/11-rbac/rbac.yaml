apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-reader
  namespace: ktslab
  labels:
    app: ci-deployer
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ci-deployer-pod-reader
  namespace: ktslab
  labels:
    app: ci-deployer
subjects:
  - kind: ServiceAccount
    name: ci-deployer
    namespace: ktslab
roleRef:
  kind: Role
  name: pod-reader
  apiGroup: rbac.authorization.k8s.io
# Apply this file to resolve the Forbidden error:
#   kubectl apply -f rbac.yaml
# Verify:
#   kubectl auth can-i list pods --as=system:serviceaccount:ktslab:ci-deployer -n ktslab

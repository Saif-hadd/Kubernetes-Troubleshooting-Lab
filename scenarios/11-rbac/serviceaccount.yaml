apiVersion: v1
kind: Namespace
metadata:
  name: ktslab
  labels:
    app.kubernetes.io/part-of: ktslab
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ci-deployer
  namespace: ktslab
  labels:
    app: ci-deployer
# No Role/RoleBinding is attached, so this ServiceAccount cannot list/get
# Pods. Reproduce with:
#   kubectl get pods -n ktslab --as=system:serviceaccount:ktslab:ci-deployer
#   -> Error from server (Forbidden): pods is forbidden ...
